server:
  port: 8084

spring:
  application:
    name: APIGATEWAY

  security:
    oauth2:
      client:
        registration:
          okta:
            provider: okta
            client-id: 0oa10lmxx8f9apRXU698
            client-secret: nQTrF2KRDpJ4P-jxWNwU6_Gzlv8GDcDuXtPVCNxg4mQqX0uV7LAYWGsnCRdmxwRp
            scope: openid, profile, email
        provider:
          okta:
            issuer-uri: https://integrator-4443484.okta.com/oauth2/default

      resourceserver:
        jwt:
          issuer-uri: https://integrator-4443484.okta.com/oauth2/default

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        - id: user-service
          uri: lb://USERSERVICE
          predicates:
            - Path=/users/**
          filters:
            - TokenRelay

        - id: hotel-service
          uri: lb://HOTELSERVICE
          predicates:
            - Path=/hotels/**
          filters:
            - TokenRelay

        - id: rating-service
          uri: lb://RATINGSERVICE
          predicates:
            - Path=/ratings/**
          filters:
            - TokenRelay

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka/